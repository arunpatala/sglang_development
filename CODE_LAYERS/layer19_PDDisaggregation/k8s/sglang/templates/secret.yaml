{{- if and (not .Values.model.hfToken.existingSecret) .Values.model.hfToken.value }}
# ── HuggingFace Token Secret ──────────────────────────────────────────────────
# Created only when:
#   - model.hfToken.existingSecret is NOT set (no pre-existing secret)
#   - model.hfToken.value IS set (token provided in values)
#
# For production, prefer:
#   kubectl create secret generic my-hf-token --from-literal=token=hf_xxx
# then set: model.hfToken.existingSecret: my-hf-token
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sglang.fullname" . }}-hf-token
  namespace: {{ include "sglang.namespace" . }}
  labels:
    {{- include "sglang.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.model.hfToken.secretKey }}: {{ .Values.model.hfToken.value | quote }}
{{- end }}
